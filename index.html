<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dan Messenger's personal links for Bluesky, X / Twitter, Facebook, and Instagram.">
    <meta property="og:title" content="Dan Messenger">
    <meta property="og:description" content="Find Dan Messenger on Bluesky, X / Twitter, Facebook, and Instagram.">
    <meta property="og:type" content="profile">
    <meta property="og:image" content="profile-picture.jpg">
    <meta name="theme-color" content="#f7f4ef">
    <title>Dan Messenger</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
            --background: #f7f4ef;
            --surface: #ffffff;
            --surface-strong: #f1ece4;
            --text: #1f2933;
            --muted: #68727d;
            --border: #ddd5ca;
            --focus: #1264a3;
            --shadow: 0 18px 45px rgba(31, 41, 51, 0.11);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(247, 244, 239, 0) 42%),
                var(--background);
        }

        main {
            width: min(100%, 1040px);
            min-height: 100vh;
            margin: 0 auto;
            padding: 56px 24px;
            display: grid;
            grid-template-columns: minmax(340px, 0.95fr) minmax(320px, 1.05fr);
            gap: 48px;
            align-items: center;
        }

        .profile {
            display: grid;
            gap: 20px;
            justify-items: start;
        }

        .profile-pic {
            width: clamp(128px, 18vw, 168px);
            height: clamp(128px, 18vw, 168px);
            border-radius: 50%;
            object-fit: cover;
            object-position: center;
            border: 5px solid var(--surface);
            box-shadow: var(--shadow);
        }

        h1 {
            margin: 0;
            font-size: clamp(2.2rem, 5vw, 4rem);
            line-height: 0.95;
            letter-spacing: 0;
        }

        .intro {
            max-width: 28ch;
            margin: -8px 0 0;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .links {
            display: grid;
            gap: 14px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .social-link {
            display: grid;
            grid-template-columns: 56px 1fr auto;
            gap: 16px;
            align-items: center;
            min-height: 78px;
            padding: 12px 18px 12px 12px;
            color: inherit;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 10px 22px rgba(31, 41, 51, 0.06);
            transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
        }

        .social-link:hover {
            transform: translateY(-2px);
            border-color: #bdb2a5;
            box-shadow: 0 15px 30px rgba(31, 41, 51, 0.1);
        }

        .social-link:focus-visible {
            outline: 3px solid var(--focus);
            outline-offset: 4px;
        }

        .icon {
            width: 56px;
            height: 56px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            color: #ffffff;
            font-weight: 800;
            font-size: 1.35rem;
            background: var(--accent);
        }

        .name {
            display: block;
            font-size: 1.18rem;
            font-weight: 750;
        }

        .handle {
            display: block;
            margin-top: 2px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .arrow {
            color: var(--muted);
            font-size: 1.35rem;
            line-height: 1;
        }

        @media (max-width: 820px) {
            main {
                min-height: auto;
                padding: 32px 18px;
                grid-template-columns: 1fr;
                gap: 28px;
                align-items: start;
            }

            .profile {
                justify-items: center;
                text-align: center;
            }

            .intro {
                margin-top: -10px;
            }

            .social-link {
                grid-template-columns: 48px 1fr auto;
                min-height: 68px;
                gap: 12px;
                padding: 10px 14px 10px 10px;
            }

            .icon {
                width: 48px;
                height: 48px;
                font-size: 1.15rem;
            }

            .name {
                font-size: 1.05rem;
            }

            .handle {
                font-size: 0.88rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <section class="profile" aria-labelledby="profile-title">
            <img src="profile-picture.jpg" alt="Dan Messenger" class="profile-pic" width="352" height="352">
            <h1 id="profile-title">Dan Messenger</h1>
            <p class="intro">Personal links and social profiles in one quiet corner of the web.</p>
        </section>

        <nav aria-label="Social profiles">
            <ul class="links">
                <li>
                    <a class="social-link" href="https://bsky.app/profile/danmessenger.bsky.social" target="_blank" rel="noopener noreferrer" aria-label="Dan Messenger on Bluesky">
                        <span class="icon" style="--accent: #1185fe;" aria-hidden="true">B</span>
                        <span>
                            <span class="name">Bluesky</span>
                            <span class="handle">@danmessenger.bsky.social</span>
                        </span>
                        <span class="arrow" aria-hidden="true">></span>
                    </a>
                </li>
                <li>
                    <a class="social-link" href="https://twitter.com/MessengerDan" target="_blank" rel="noopener noreferrer" aria-label="Dan Messenger on X / Twitter">
                        <span class="icon" style="--accent: #111111;" aria-hidden="true"><i class="fab fa-twitter"></i></span>
                        <span>
                            <span class="name">X / Twitter</span>
                            <span class="handle">@MessengerDan</span>
                        </span>
                        <span class="arrow" aria-hidden="true">></span>
                    </a>
                </li>
                <li>
                    <a class="social-link" href="https://www.facebook.com/dan.messenger.98" target="_blank" rel="noopener noreferrer" aria-label="Dan Messenger on Facebook">
                        <span class="icon" style="--accent: #1877f2;" aria-hidden="true"><i class="fab fa-facebook-f"></i></span>
                        <span>
                            <span class="name">Facebook</span>
                            <span class="handle">dan.messenger.98</span>
                        </span>
                        <span class="arrow" aria-hidden="true">></span>
                    </a>
                </li>
                <li>
                    <a class="social-link" href="https://www.instagram.com/dan.messenger.98/" target="_blank" rel="noopener noreferrer" aria-label="Dan Messenger on Instagram">
                        <span class="icon" style="--accent: #c13584;" aria-hidden="true"><i class="fab fa-instagram"></i></span>
                        <span>
                            <span class="name">Instagram</span>
                            <span class="handle">@dan.messenger.98</span>
                        </span>
                        <span class="arrow" aria-hidden="true">></span>
                    </a>
                </li>
            </ul>
        </nav>
    </main>
</body>
</html>
